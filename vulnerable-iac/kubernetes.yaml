# =============================================================
# INTENTIONALLY INSECURE KUBERNETES MANIFEST — FOR TESTING ONLY
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insecure-app
  labels:
    app: insecure-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insecure-app
  template:
    metadata:
      labels:
        app: insecure-app
    spec:
      hostNetwork: true
      hostPID: true
      containers:
        - name: insecure-container
          image: nginx:latest
          securityContext:
            privileged: true
            runAsUser: 0
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
            capabilities:
              add: ["ALL"]
          ports:
            - containerPort: 80
          env:
            - name: DB_PASSWORD
              value: "SuperSecret123!"
---
apiVersion: v1
kind: Service
metadata:
  name: insecure-service
spec:
  type: LoadBalancer
  selector:
    app: insecure-app
  ports:
    - port: 80
      targetPort: 80
